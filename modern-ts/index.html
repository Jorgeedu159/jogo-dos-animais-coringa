<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Jogo de memória Olha o Macaco! com carta coringa implementado em TypeScript">
  <title>Olha o Macaco! - TypeScript</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen screen--home" id="homeScreen">
      <div class="panel panel--centered">
        <header class="panel__header">
          <h1>🎮 Olha o Macaco!</h1>
          <p class="subtitulo">Encontre os pares de animais antes de virar a carta coringa.</p>
        </header>
        <div class="panel__body">
          <div class="input-grupo">
            <label for="playerCount">Quantos jogadores? (2-5)</label>
            <input type="number" id="playerCount" min="2" max="5" value="2" />
          </div>
          <div id="playerNames" class="container-nomes"></div>
        </div>
        <footer class="panel__footer">
          <button id="startButton" class="btn btn--primary">Iniciar Jogo</button>
        </footer>
      </div>
    </section>

    <section class="screen screen--game screen--hidden" id="gameScreen">
      <div class="game-header">
        <div class="current-player-card">
          <span class="label">Vez de</span>
          <strong id="currentPlayerName">Jogador 1</strong>
          <span id="statusText" class="status-text">É sua vez!</span>
        </div>
        <button id="newGameButton" class="btn btn--secondary">Novo Jogo</button>
      </div>
      <div class="board-wrapper">
        <aside class="score-panel">
          <h2>Placar</h2>
          <div id="scoreBoard" class="placar"></div>
        </aside>
        <section id="board" class="tabuleiro" aria-label="Tabuleiro de cartas"></section>
      </div>
    </section>

    <section class="screen screen--final screen--hidden" id="finalScreen">
      <div class="panel panel--centered panel--final">
        <h1>🎊 Fim de Jogo</h1>
        <div id="finalMessage" class="resultado-final"></div>
        <button id="restartButton" class="btn btn--primary">Jogar Novamente</button>
      </div>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
